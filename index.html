<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice / Work Report</title>
<style>
  :root{
    --dark:#1A2238; --darker:#0F1729; --gold:#D4AF37; --gold-light:#E8C76B;
    --red:#C0392B; --cream:#F5F1EB; --paper:#FAF6F0;
    --beige:#F0E8D8; --border:#D4CABB; --text:#1A2238; --muted:#6B7280;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--cream);color:var(--text);line-height:1.5;padding:16px;min-height:100vh}
  .container{max-width:640px;margin:0 auto}

  /* HEADER */
  .header{background:#fff;color:var(--dark);padding:14px 22px;border-radius:10px 10px 0 0;display:flex;align-items:center;gap:14px;position:relative;border-bottom:3px solid var(--red)}
  .logo-img{height:64px;width:auto;flex-shrink:0;display:block}
  .header .title-block{flex:1;min-width:0;text-align:right}
  .header .title{font-size:14px;font-weight:700;line-height:1.2;color:var(--dark);text-transform:uppercase;letter-spacing:.5px}
  .header .subtitle{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic}
  .header-icons{display:flex;gap:8px;flex-shrink:0}
  .header-icon-btn{background:var(--paper);border:1px solid var(--border);color:var(--dark);width:34px;height:34px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
  .header-icon-btn:hover{background:var(--beige)}
  .header-icon-btn.active{background:var(--dark);color:#fff;border-color:var(--dark)}
  @media (max-width:480px){.header{padding:12px 14px;gap:8px}.logo-img{height:50px}.header .title{font-size:12px}.header .subtitle{font-size:10px}}

  /* SECTIONS */
  .section{background:var(--paper);padding:18px 22px;border-bottom:1px solid var(--border)}
  .section:last-of-type{border-radius:0 0 10px 10px}
  .section-title{font-size:11px;font-weight:700;color:var(--dark);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--red)}

  /* COLLAPSIBLE PANELS */
  .panel{background:#F7F2E9;border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:14px;display:none}
  .panel.visible{display:block}
  .panel-title{font-size:11.5px;font-weight:700;color:var(--dark);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
  .panel-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px}

  /* FIELDS */
  .field{margin-bottom:14px}
  .field:last-child{margin-bottom:0}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
  input,textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:5px;font-size:14.5px;background:#fff;font-family:inherit;color:var(--text)}
  input:focus,textarea:focus{outline:none;border-color:var(--dark);box-shadow:0 0 0 3px rgba(26,34,56,.08)}
  textarea{resize:vertical;min-height:60px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width:480px){.field-row{grid-template-columns:1fr}}

  /* DAY CARDS */
  .day-card{background:var(--beige);padding:14px;border-radius:6px;margin-bottom:10px;position:relative}
  .day-header{font-size:11px;font-weight:700;color:#fff;background:var(--dark);padding:5px 12px;border-radius:4px;display:inline-block;letter-spacing:.5px}
  .day-remove{position:absolute;top:12px;right:12px;background:#fff;border:1px solid var(--border);width:30px;height:30px;border-radius:5px;cursor:pointer;font-size:18px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s}
  .day-remove:hover{background:#FEE2E2;border-color:var(--red);color:var(--red)}
  .day-body{margin-top:12px}

  /* BUTTONS */
  button{touch-action:manipulation;-webkit-tap-highlight-color:rgba(212,175,55,0.2);-webkit-appearance:none;appearance:none}
  .btn{width:100%;padding:14px;background:#fff;border:1px solid var(--border);border-radius:6px;font-size:14px;cursor:pointer;font-weight:500;color:var(--text);transition:all .15s;font-family:inherit;touch-action:manipulation}
  .btn:hover{background:#FAF0E0}
  .btn-add-day{border:1.5px dashed var(--border);background:#fff;margin-top:6px}
  .btn-generate{margin-top:16px;font-weight:600;background:#fff;border-color:var(--dark)}
  .btn-action{padding:14px;font-size:13.5px;font-weight:500}
  .btn-pdf{background:#fff;border:1.5px solid var(--dark);color:var(--dark)}
  .btn-pdf:hover{background:var(--dark);color:#fff}
  .btn-email{background:#fff;border:1.5px solid #2563EB;color:#2563EB}
  .btn-email:hover{background:#2563EB;color:#fff}
  .btn-whatsapp{background:#25D366;border:1.5px solid #25D366;color:#fff}
  .btn-whatsapp:hover{background:#1DA851}
  .btn-share{background:#fff;border:1.5px solid var(--gold);color:#B8941F}
  .btn-share:hover{background:var(--gold);color:#fff}
  .btn-clear-sign{background:#fff;border:1px solid var(--border);color:var(--muted);padding:8px 14px;font-size:12.5px;border-radius:5px;cursor:pointer;font-family:inherit}
  .btn-clear-sign:hover{background:#F8F4EE}
  .btn-small{padding:8px 14px;font-size:12.5px;background:#fff;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-family:inherit;color:var(--text)}
  .btn-small:hover{background:#F8F4EE}
  .btn-save-settings{background:var(--dark);color:#fff;border:1px solid var(--dark);font-weight:600}
  .btn-save-settings:hover{background:#2A3458}

  /* HISTORY LIST */
  .history-list{max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:5px;background:#fff}
  .history-item{padding:10px 12px;border-bottom:1px solid #EFEAE0;cursor:pointer;transition:background .15s;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .history-item:hover{background:var(--paper)}
  .history-item:last-child{border-bottom:none}
  .history-meta{flex:1;min-width:0}
  .history-meta .h-num{font-size:11px;color:var(--muted);font-family:'Courier New',monospace;margin-bottom:2px}
  .history-meta .h-info{font-size:13px;color:var(--text);font-weight:500}
  .history-meta .h-date{font-size:11.5px;color:var(--muted);margin-top:2px}
  .history-amount{font-size:14px;font-weight:700;color:var(--gold);flex-shrink:0}
  .history-empty{padding:20px;text-align:center;color:var(--muted);font-style:italic;font-size:13px}

  /* TOTAL CARD */
  .total-card{background:var(--dark);color:#fff;padding:18px 22px;border-radius:8px;margin-top:18px}
  .total-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:14.5px;opacity:.9}
  .total-due-row{font-size:18px;font-weight:700;margin-top:10px;padding-top:12px;border-top:1px solid #2A3458;opacity:1}
  .total-due-value{color:var(--gold);font-size:24px}

  /* INVOICE PREVIEW */
  .invoice-preview{display:none;background:#fff;padding:26px;border-radius:8px;margin-top:18px;box-shadow:0 4px 16px rgba(0,0,0,0.06)}
  .invoice-preview.visible{display:block}
  .invoice-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--dark);padding-bottom:14px;margin-bottom:18px;gap:14px}
  .invoice-meta-left{flex:1;min-width:0}
  .invoice-meta-left .name{font-size:20px;font-weight:700;color:var(--dark)}
  .invoice-meta-left .week{font-size:12.5px;color:var(--muted);margin-top:3px}
  .invoice-meta-right{text-align:right;flex-shrink:0}
  .invoice-meta-right .invoice-num{font-size:12px;color:var(--dark);font-weight:600;font-family:'Courier New',monospace}

  .invoice-table{width:100%;border-collapse:collapse;margin-bottom:18px}
  .invoice-table th{background:var(--paper);font-size:11px;font-weight:700;text-align:left;padding:9px 10px;color:var(--dark);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
  .invoice-table th.right{text-align:right}
  .invoice-table td{padding:11px 10px;font-size:13px;border-bottom:1px solid #EFEAE0;vertical-align:top}
  .invoice-table td.right{text-align:right}
  .invoice-table td.work{color:var(--muted);font-size:12.5px;line-height:1.4}
  .invoice-table tr:last-child td{border-bottom:none}

  .invoice-total{background:var(--paper);padding:12px 14px;border-radius:5px;display:flex;justify-content:space-between;align-items:center;font-size:15px}
  .invoice-total .label{font-weight:600;color:var(--dark)}
  .invoice-total .value{color:var(--gold);font-weight:700;font-size:18px}

  /* SIGNATURE SECTION */
  .signature-section{margin-top:22px;padding-top:18px;border-top:1px dashed var(--border)}
  .sign-meta{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  @media (max-width:480px){.sign-meta{grid-template-columns:1fr}}
  .sign-meta .field{margin-bottom:0}
  .sign-area-label{font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .sign-canvas-wrapper{background:#FAFAF7;border:1.5px dashed var(--border);border-radius:6px;padding:4px;touch-action:none}
  #signCanvas{display:block;width:100%;height:140px;cursor:crosshair;touch-action:none}
  .sign-hint{font-size:11px;color:var(--muted);font-style:italic;text-align:center;margin-top:6px}

  /* ACTIONS */
  .actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
  .actions-grid.three-cols{grid-template-columns:1fr 1fr 1fr}
  .actions-grid.four-cols{grid-template-columns:1fr 1fr 1fr 1fr}
  @media (max-width:480px){.actions-grid,.actions-grid.three-cols,.actions-grid.four-cols{grid-template-columns:1fr}}

  /* PRINT STYLES */
  @media print{
    body{background:#fff;padding:0}
    .container{max-width:100%}
    .section,.total-card,.btn,.btn-generate,.actions-grid,.header,.panel{display:none!important}
    .invoice-preview{display:block!important;box-shadow:none;padding:0;margin:0;background:#fff}
    .invoice-preview.visible{display:block!important}
  }

  /* GENERATED INVOICE TYPOGRAPHY */
  .gen-company-info{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:10px 20px;border-radius:6px;font-size:13.5px;box-shadow:0 4px 16px rgba(0,0,0,0.2);opacity:0;transition:opacity .25s;z-index:1000;pointer-events:none}
  .toast.show{opacity:1}

  /* CUSTOM DATE PICKER */
  input[readonly]{cursor:pointer;background:#fff}
  .dp-overlay{position:absolute;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,0.18);padding:12px;z-index:2000;width:280px;max-width:calc(100vw - 24px)}
  .dp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:0 4px}
  .dp-nav{background:var(--paper);border:1px solid var(--border);font-size:16px;cursor:pointer;padding:6px 12px;color:var(--dark);border-radius:5px;font-family:inherit;line-height:1}
  .dp-nav:hover{background:var(--beige)}
  .dp-title{font-weight:600;font-size:14.5px;color:var(--dark)}
  .dp-week{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;font-size:11px;color:var(--muted);text-align:center;font-weight:700;text-transform:uppercase}
  .dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .dp-day{padding:10px 0;text-align:center;cursor:pointer;border-radius:5px;font-size:13.5px;color:var(--text);user-select:none}
  .dp-day:hover{background:var(--paper)}
  .dp-day.empty{cursor:default;visibility:hidden}
  .dp-day.today{font-weight:700;color:var(--red)}
  .dp-day.selected{background:var(--dark);color:#fff;font-weight:600}
  .dp-day.selected:hover{background:var(--darker)}
  .dp-footer{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);gap:6px}
  .dp-footer button{flex:1;background:transparent;border:1px solid var(--border);padding:8px;border-radius:5px;font-size:12.5px;cursor:pointer;color:var(--dark);font-family:inherit}
  .dp-footer button:hover{background:var(--paper)}
  .dp-footer .dp-today-btn{background:var(--dark);color:#fff;border-color:var(--dark)}
  .dp-footer .dp-today-btn:hover{background:var(--darker)}
</style>
</head>

      <button type="button" class="header-icon-btn" onclick="togglePanel('historyPanel')" title="View past invoices">📋</button>
      <button type="button" class="header-icon-btn" onclick="togglePanel('settingsPanel')" title="Settings">⚙️</button>
    </div>
  </div>

  <!-- SETTINGS PANEL (recipient info) -->
  <div class="section" id="settingsPanelSection" style="display:none;border-radius:0">
    <div class="panel visible">
      <div class="panel-title">
        <span>Recipient Settings (one-time setup)</span>
        <button type="button" class="panel-close" onclick="togglePanel('settingsPanel')">×</button>
      </div>
      <div class="field">
        <label>Recipient name (your boss or company contact)</label>
        <input type="text" id="recipientName" placeholder="e.g., Alessandra">
      </div>
      <div class="field-row">
        <div class="field">
          <label>WhatsApp number (with country code, no symbols)</label>
          <input type="tel" id="recipientPhone" placeholder="e.g., 14155551234" inputmode="tel">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="recipientEmail" placeholder="boss@company.com" inputmode="email">
        </div>
      </div>
      <button type="button" class="btn btn-save-settings" onclick="saveRecipientInfo()">💾 Save Settings</button>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="section" id="historyPanelSection" style="display:none;border-radius:0">
    <div class="panel visible">
      <div class="panel-title">
        <span>Past Invoices</span>
        <button type="button" class="panel-close" onclick="togglePanel('historyPanel')">×</button>
      </div>
      <div id="historyList" class="history-list">
        <div class="history-empty">No invoices yet. Generate your first one below.</div>
      </div>
      <div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end">
        <button type="button" class="btn-small" onclick="clearHistory()" style="color:var(--red)">Clear all history</button>
      </div>
    </div>
  </div>

  <!-- CONTRACTOR INFO -->
  <div class="section">
    <div class="section-title">Contractor Info</div>
    <div class="field">
      <label>Full name</label>
      <input type="text" id="contractorName" placeholder="Your full name" autocomplete="name" oninput="saveContractorInfo()">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Week starting</label>
        <input type="text" id="weekStarting" placeholder="MM/DD/YYYY" readonly onclick="openDatePicker(this)">
      </div>
      <div class="field">
        <label>Rate ($/hr)</label>
        <input type="number" id="rate" placeholder="20" step="0.01" inputmode="decimal" oninput="updateTotal(); saveContractorInfo();">
      </div>
    </div>
  </div>

  <!-- WORK DAYS -->
  <div class="section">
    <div class="section-title">Work Days</div>
    <div id="daysContainer"></div>
    <button type="button" class="btn btn-add-day" onclick="addDay()">+ Add day</button>
  </div>

  <!-- TOTAL SUMMARY -->
  <div class="total-card">
    <div class="total-row"><span>Total hours</span><span id="totalHoursDisplay">0.0 hrs</span></div>
    <div class="total-row"><span>Rate</span><span id="totalRateDisplay">$0/hr</span></div>
    <div class="total-row total-due-row"><span>Total due</span><span class="total-due-value" id="totalDueDisplay">$0.00</span></div>
  </div>

  <!-- GENERATE BUTTON -->
  <button type="button" class="btn btn-generate" onclick="generateInvoice()">📄 Generate Invoice</button>

  <!-- INVOICE PREVIEW -->
  <div class="invoice-preview" id="invoicePreview"></div>

  <!-- ACTIONS -->
  <div class="actions-grid four-cols" id="actionsGrid" style="display:none">
    <button type="button" class="btn btn-action btn-pdf" onclick="saveAsPDF()">📥 PDF</button>
    <button type="button" class="btn btn-action btn-email" onclick="sendEmail()">✉️ Email</button>
    <button type="button" class="btn btn-action btn-whatsapp" onclick="sendWhatsApp()">📱 WhatsApp</button>
    <button type="button" class="btn btn-action btn-share" id="shareBtn" onclick="shareWithImage()" style="display:none">📤 Share+</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ============== STORAGE KEYS ==============
const STORAGE = {
  CONTRACTOR: 'mda_invoice_contractor',
  RECIPIENT: 'mda_invoice_recipient',
  HISTORY: 'mda_invoice_history'
};

// ============== STATE ==============
let dayCounter = 0;
let signaturePadInitialized = false;
let hasSignature = false;
let invoiceNumber = '';

// ============== HELPERS ==============
function $(id){ return document.getElementById(id); }

function showToast(msg, ms){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms || 2200);
}

function autoFormatDate(input){
  // legacy helper - kept for signDate field inside generated invoice
  let v = input.value.replace(/\D/g, '');
  if(v.length >= 2) v = v.slice(0,2) + '/' + v.slice(2);
  if(v.length >= 5) v = v.slice(0,5) + '/' + v.slice(5,9);
  input.value = v;
}

function isoToUS(iso){
  // converts YYYY-MM-DD (from <input type="date">) to MM/DD/YYYY
  if(!iso) return '';
  if(iso.indexOf('/') !== -1) return iso; // already US format
  const parts = iso.split('-');
  if(parts.length !== 3) return iso;
  return parts[1] + '/' + parts[2] + '/' + parts[0];
}

function usToIso(us){
  // converts MM/DD/YYYY back to YYYY-MM-DD (for restoring saved data)
  if(!us) return '';
  if(us.indexOf('-') !== -1 && us.indexOf('/') === -1) return us; // already ISO
  const parts = us.split('/');
  if(parts.length !== 3) return us;
  const [m, d, y] = parts;
  return y + '-' + m.padStart(2,'0') + '-' + d.padStart(2,'0');
}

function todayUS(){
  const t = new Date();
  return String(t.getMonth()+1).padStart(2,'0') + '/' + String(t.getDate()).padStart(2,'0') + '/' + t.getFullYear();
}

function todayISO(){
  const t = new Date();
  return t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
}

// ============== CUSTOM DATE PICKER ==============
// Sempre exibe MM/DD/YYYY independente do idioma do dispositivo
let dpState = null; // { overlay, input, year, month }

function openDatePicker(input){
  closeDatePicker();
  const val = (input.value || '').trim();
  let init = new Date();
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(val)){
    const [m,d,y] = val.split('/').map(Number);
    if(!isNaN(m) && !isNaN(d) && !isNaN(y)) init = new Date(y, m-1, d);
  }
  const overlay = document.createElement('div');
  overlay.className = 'dp-overlay';
  document.body.appendChild(overlay);
  dpState = { overlay: overlay, input: input, year: init.getFullYear(), month: init.getMonth() };
  renderDatePicker();
  positionDatePicker(input, overlay);
  // anexar handler
  overlay.addEventListener('click', handleDatePickerClick);
  setTimeout(() => { document.addEventListener('mousedown', handleOutsideDatePicker); document.addEventListener('touchstart', handleOutsideDatePicker); }, 50);
  window.addEventListener('resize', closeDatePicker);
  window.addEventListener('scroll', closeDatePicker, true);
}

function positionDatePicker(input, overlay){
  const rect = input.getBoundingClientRect();
  const ovH = overlay.offsetHeight;
  const ovW = overlay.offsetWidth;
  const spaceBelow = window.innerHeight - rect.bottom;
  let top = (rect.bottom + window.scrollY + 4);
  if(spaceBelow < ovH + 10 && rect.top > ovH + 10){
    top = rect.top + window.scrollY - ovH - 4;
  }
  let left = rect.left + window.scrollX;
  if(left + ovW > window.innerWidth - 12){
    left = window.innerWidth - ovW - 12 + window.scrollX;
  }
  if(left < 12) left = 12;
  overlay.style.top = top + 'px';
  overlay.style.left = left + 'px';
}

function renderDatePicker(){
  if(!dpState) return;
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['S','M','T','W','T','F','S'];
  const y = dpState.year, m = dpState.month;
  const firstDow = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m+1, 0).getDate();
  const selectedUS = (dpState.input.value || '').trim();
  const todayStr = todayUS();
  let html = '<div class="dp-head">';
  html += '<button class="dp-nav" type="button" data-act="prev">&#10094;</button>';
  html += '<div class="dp-title">' + months[m] + ' ' + y + '</div>';
  html += '<button class="dp-nav" type="button" data-act="next">&#10095;</button>';
  html += '</div>';
  html += '<div class="dp-week">' + days.map(d => '<div>' + d + '</div>').join('') + '</div>';
  html += '<div class="dp-grid">';
  for(let i = 0; i < firstDow; i++) html += '<div class="dp-day empty"></div>';
  for(let d = 1; d <= lastDate; d++){
    const dStr = String(m+1).padStart(2,'0') + '/' + String(d).padStart(2,'0') + '/' + y;
    const cls = 'dp-day' + (dStr === selectedUS ? ' selected' : '') + (dStr === todayStr ? ' today' : '');
    html += '<div class="' + cls + '" data-date="' + dStr + '">' + d + '</div>';
  }
  html += '</div>';
  html += '<div class="dp-footer">';
  html += '<button type="button" data-act="clear">Clear</button>';
  html += '<button type="button" class="dp-today-btn" data-act="today">Today</button>';
  html += '</div>';
  dpState.overlay.innerHTML = html;
}

function handleDatePickerClick(e){
  e.stopPropagation();
  if(!dpState) return;
  const act = e.target.dataset.act;
  const date = e.target.dataset.date;
  if(act === 'prev'){
    if(dpState.month === 0){ dpState.month = 11; dpState.year--; } else dpState.month--;
    renderDatePicker();
  } else if(act === 'next'){
    if(dpState.month === 11){ dpState.month = 0; dpState.year++; } else dpState.month++;
    renderDatePicker();
  } else if(act === 'today'){
    const t = new Date();
    dpState.input.value = todayUS();
    dpState.year = t.getFullYear(); dpState.month = t.getMonth();
    triggerDateChange(dpState.input);
    closeDatePicker();
  } else if(act === 'clear'){
    dpState.input.value = '';
    triggerDateChange(dpState.input);
    closeDatePicker();
  } else if(date){
    dpState.input.value = date;
    triggerDateChange(dpState.input);
    closeDatePicker();
  }
}

function triggerDateChange(input){
  input.dispatchEvent(new Event('change', { bubbles: true }));
  try { if(typeof updateTotal === 'function') updateTotal(); } catch(e){}
}

function handleOutsideDatePicker(e){
  if(!dpState) return;
  if(dpState.overlay.contains(e.target)) return;
  if(e.target === dpState.input) return;
  closeDatePicker();
}

function closeDatePicker(){
  if(!dpState) return;
  dpState.overlay.remove();
  document.removeEventListener('mousedown', handleOutsideDatePicker);
  document.removeEventListener('touchstart', handleOutsideDatePicker);
  window.removeEventListener('resize', closeDatePicker);
  window.removeEventListener('scroll', closeDatePicker, true);
  dpState = null;
}

function formatMoney(n){
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function dateShort(usDate){
  if(!usDate) return '';
  const parts = usDate.split('/');
  if(parts.length !== 3) return usDate;
  const [m, d, y] = parts.map(Number);
  const dateObj = new Date(y, m-1, d);
  if(isNaN(dateObj.getTime())) return usDate;
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[dateObj.getDay()] + ', ' + months[dateObj.getMonth()] + ' ' + d;
}

function dateLong(usDate){
  if(!usDate) return '';
  const parts = usDate.split('/');
  if(parts.length !== 3) return usDate;
  const [m, d, y] = parts.map(Number);
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  if(m < 1 || m > 12) return usDate;
  return months[m-1] + ' ' + d + ', ' + y;
}

function escapeHTML(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============== LOCAL STORAGE: Contractor Info ==============
function saveContractorInfo(){
  try{
    const data = {
      name: $('contractorName').value,
      rate: $('rate').value
    };
    localStorage.setItem(STORAGE.CONTRACTOR, JSON.stringify(data));
  } catch(e) {}
}

function loadContractorInfo(){
  try{
    const data = JSON.parse(localStorage.getItem(STORAGE.CONTRACTOR) || '{}');
    if(data.name) $('contractorName').value = data.name;
    if(data.rate) $('rate').value = data.rate;
    updateTotal();
  } catch(e) {}
}

// ============== LOCAL STORAGE: Recipient Settings ==============
function saveRecipientInfo(){
  try{
    const data = {
      name: $('recipientName').value.trim(),
      phone: $('recipientPhone').value.replace(/\D/g, ''),
      email: $('recipientEmail').value.trim()
    };
    localStorage.setItem(STORAGE.RECIPIENT, JSON.stringify(data));
    showToast('Settings saved');
    togglePanel('settingsPanel');
  } catch(e) {
    showToast('Failed to save settings');
  }
}

function loadRecipientInfo(){
  try{
    const data = JSON.parse(localStorage.getItem(STORAGE.RECIPIENT) || '{}');
    if(data.name) $('recipientName').value = data.name;
    if(data.phone) $('recipientPhone').value = data.phone;
    if(data.email) $('recipientEmail').value = data.email;
    return data;
  } catch(e) { return {}; }
}

function getRecipient(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE.RECIPIENT) || '{}');
  } catch(e) { return {}; }
}

// ============== LOCAL STORAGE: Invoice History ==============
function saveInvoiceToHistory(data){
  try{
    const history = JSON.parse(localStorage.getItem(STORAGE.HISTORY) || '[]');
    history.unshift({
      invoiceNumber: data.invoiceNumber,
      name: data.name,
      week: data.week,
      totalDue: data.totalDue,
      totalHours: data.totalHours,
      timestamp: Date.now(),
      data: data
    });
    // Keep last 50
    if(history.length > 50) history.splice(50);
    localStorage.setItem(STORAGE.HISTORY, JSON.stringify(history));
    renderHistory();
  } catch(e) {}
}

function loadHistory(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE.HISTORY) || '[]');
  } catch(e) { return []; }
}

function clearHistory(){
  if(!confirm('Are you sure you want to delete all invoice history? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE.HISTORY);
  renderHistory();
  showToast('History cleared');
}

function renderHistory(){
  const history = loadHistory();
  const container = $('historyList');
  if(history.length === 0){
    container.innerHTML = '<div class="history-empty">No invoices yet. Generate your first one below.</div>';
    return;
  }
  let html = '';
  history.forEach((item, idx) => {
    const dateStr = new Date(item.timestamp).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    html +=
      '<div class="history-item" onclick="loadFromHistory(' + idx + ')">' +
        '<div class="history-meta">' +
          '<div class="h-num">' + escapeHTML(item.invoiceNumber) + '</div>' +
          '<div class="h-info">Week of ' + escapeHTML(dateLong(item.week)) + ' · ' + item.totalHours.toFixed(1) + ' hrs</div>' +
          '<div class="h-date">Generated ' + dateStr + '</div>' +
        '</div>' +
        '<div class="history-amount">' + formatMoney(item.totalDue) + '</div>' +
      '</div>';
  });
  container.innerHTML = html;
}

function loadFromHistory(idx){
  const history = loadHistory();
  if(!history[idx]) return;
  const data = history[idx].data;

  // Restaurar nos campos do form (converter MM/DD/YYYY -> YYYY-MM-DD para inputs type="date")
  $('contractorName').value = data.name;
  $("weekStarting").value = data.week;
  $('rate').value = data.rate;

  // Limpar dias atuais e adicionar os do historico
  $('daysContainer').innerHTML = '';
  dayCounter = 0;
  data.days.forEach(d => {
    addDay();
    const cards = document.querySelectorAll('.day-card');
    const last = cards[cards.length - 1];
    last.querySelector('.day-date').value = d.date;
    last.querySelector('.day-hours').value = d.hours;
    last.querySelector('.day-work').value = d.work;
  });
  updateTotal();

  // Fechar painel de historico
  togglePanel('historyPanel');

  // Regenerar invoice
  invoiceNumber = history[idx].invoiceNumber;
  generateInvoice(true);
  showToast('Loaded from history');
}

// ============== PANELS ==============
function togglePanel(panelId){
  const section = $(panelId + 'Section');
  if(section.style.display === 'none' || !section.style.display){
    // Fechar outros painéis primeiro
    document.querySelectorAll('[id$="PanelSection"]').forEach(s => s.style.display = 'none');
    section.style.display = 'block';
    if(panelId === 'historyPanel') renderHistory();
  } else {
    section.style.display = 'none';
  }
}

// ============== DAYS MANAGEMENT ==============
function addDay(){
  dayCounter++;
  const container = $('daysContainer');
  const dayEl = document.createElement('div');
  dayEl.className = 'day-card';
  dayEl.innerHTML =
    '<div class="day-header" data-day-num="' + dayCounter + '">Day ' + dayCounter + '</div>' +
    '<button type="button" class="day-remove" onclick="removeDay(this)" title="Remove day">×</button>' +
    '<div class="day-body">' +
      '<div class="field-row" style="margin-bottom:10px">' +
        '<div class="field" style="margin-bottom:0">' +
          '<label>Date</label>' +
          '<input type="text" class="day-date" placeholder="MM/DD/YYYY" readonly onclick="openDatePicker(this)">' +
        '</div>' +
        '<div class="field" style="margin-bottom:0">' +
          '<label>Hours</label>' +
          '<input type="number" class="day-hours" placeholder="8" step="0.5" inputmode="decimal" oninput="updateTotal()">' +
        '</div>' +
      '</div>' +
      '<div class="field" style="margin-bottom:0">' +
        '<label>Work done</label>' +
        '<textarea class="day-work" rows="2" placeholder="Briefly describe what you did..."></textarea>' +
      '</div>' +
    '</div>';
  container.appendChild(dayEl);
  renumberDays();
  updateTotal();
}

function removeDay(btn){
  btn.closest('.day-card').remove();
  renumberDays();
  updateTotal();
}

function renumberDays(){
  document.querySelectorAll('.day-card').forEach((d, i) => {
    d.querySelector('.day-header').textContent = 'Day ' + (i+1);
  });
}

function updateTotal(){
  let totalHours = 0;
  document.querySelectorAll('.day-hours').forEach(input => {
    const v = parseFloat(input.value) || 0;
    totalHours += v;
  });
  const rate = parseFloat($('rate').value) || 0;
  const totalDue = totalHours * rate;
  $('totalHoursDisplay').textContent = totalHours.toFixed(1) + ' hrs';
  $('totalRateDisplay').textContent = '$' + rate.toFixed(0) + '/hr';
  $('totalDueDisplay').textContent = formatMoney(totalDue);
}

// ============== INVOICE GENERATION ==============
function gatherData(){
  const name = $('contractorName').value.trim() || '[Contractor name]';
  const week = $('weekStarting').value || '[Week date]';
  const rate = parseFloat($('rate').value) || 0;

  const days = [];
  document.querySelectorAll('.day-card').forEach(d => {
    const date = d.querySelector('.day-date').value || '';
    const hours = parseFloat(d.querySelector('.day-hours').value) || 0;
    const work = d.querySelector('.day-work').value.trim() || '';
    if(date || hours || work){
      days.push({ date, hours, work, amount: hours * rate });
    }
  });

  const totalHours = days.reduce((sum, d) => sum + d.hours, 0);
  const totalDue = totalHours * rate;

  return { name, week, rate, days, totalHours, totalDue };
}

function genInvoiceNumber(){
  const t = new Date();
  const datePart = '' + t.getFullYear() + String(t.getMonth()+1).padStart(2,'0') + String(t.getDate()).padStart(2,'0');
  const rand = Math.floor(Math.random() * 900 + 100);
  return 'INV-' + datePart + '-' + rand;
}

function generateInvoice(skipNewNumber){
  const data = gatherData();

  if(!data.name || data.name === '[Contractor name]'){
    alert('Please fill in your full name first.');
    return;
  }
  if(data.days.length === 0){
    alert('Please add at least one day with hours.');
    return;
  }

  if(!skipNewNumber){
    invoiceNumber = genInvoiceNumber();
    data.invoiceNumber = invoiceNumber;
    saveInvoiceToHistory(data);
  }

  const companyName = $('companyTitle').textContent || 'Company';

  let rowsHTML = '';
  data.days.forEach(d => {
    rowsHTML +=
      '<tr>' +
        '<td>' + escapeHTML(dateShort(d.date)) + '</td>' +
        '<td class="work">' + escapeHTML(d.work || '—') + '</td>' +
        '<td class="right">' + d.hours.toFixed(1) + '</td>' +
        '<td class="right">' + formatMoney(d.amount) + '</td>' +
      '</tr>';
  });

  let html =
    '<div class="invoice-header">' +
      '<div class="invoice-meta-left">' +
        '<div class="name">' + escapeHTML(data.name) + '</div>' +
        '<div class="week">Week of ' + escapeHTML(dateLong(data.week)) + '</div>' +
        '<div class="gen-company-info">Submitted to ' + escapeHTML(companyName) + '</div>' +
      '</div>' +
      '<div class="invoice-meta-right">' +
        '<div class="invoice-num">' + escapeHTML(invoiceNumber) + '</div>' +
      '</div>' +
    '</div>' +

    '<table class="invoice-table">' +
      '<thead><tr>' +
        '<th>Day</th><th>Description</th><th class="right">Hrs</th><th class="right">Amount</th>' +
      '</tr></thead>' +
      '<tbody>' + rowsHTML + '</tbody>' +
    '</table>' +

    '<div class="invoice-total">' +
      '<span class="label">Total due</span>' +
      '<span class="value">' + formatMoney(data.totalDue) + '</span>' +
    '</div>' +

    '<div class="signature-section">' +
      '<div class="sign-meta">' +
        '<div class="field">' +
          '<label>Date</label>' +
          '<input type="text" id="signDate" value="' + todayUS() + '" maxlength="10" inputmode="numeric" oninput="autoFormatDate(this)" onblur="autoFormatDate(this)">' +
        '</div>' +
        '<div class="field">' +
          '<label>Full name</label>' +
          '<input type="text" id="signName" value="' + escapeHTML(data.name) + '">' +
        '</div>' +
      '</div>' +
      '<div class="sign-area-label">' +
        '<span>Signature</span>' +
        '<button type="button" class="btn-clear-sign" onclick="clearSignature()">Clear</button>' +
      '</div>' +
      '<div class="sign-canvas-wrapper">' +
        '<canvas id="signCanvas" width="600" height="140"></canvas>' +
      '</div>' +
      '<div class="sign-hint">Sign with your finger on mobile, or with the mouse on desktop.</div>' +
    '</div>';

  const preview = $('invoicePreview');
  preview.innerHTML = html;
  preview.classList.add('visible');

  $('actionsGrid').style.display = 'grid';

  // Mostrar botão Share+ se Web Share API estiver disponível
  if(navigator.share){
    $('shareBtn').style.display = 'block';
  }

  // Inicializar signature pad
  setTimeout(initSignaturePad, 50);

  // Scroll para o invoice
  preview.scrollIntoView({behavior:'smooth', block:'start'});
}

// ============== SIGNATURE PAD ==============
let signCanvas, signCtx, isDrawing = false, lastX, lastY;

function initSignaturePad(){
  signCanvas = document.getElementById('signCanvas');
  if(!signCanvas) return;
  signCtx = signCanvas.getContext('2d');

  resizeCanvas();
  setupCanvas();

  signCanvas.addEventListener('mousedown', startDrawing);
  signCanvas.addEventListener('mousemove', draw);
  signCanvas.addEventListener('mouseup', stopDrawing);
  signCanvas.addEventListener('mouseleave', stopDrawing);

  signCanvas.addEventListener('touchstart', handleTouch, {passive:false});
  signCanvas.addEventListener('touchmove', handleTouch, {passive:false});
  signCanvas.addEventListener('touchend', stopDrawing);

  window.addEventListener('resize', handleResize);
}

function handleResize(){
  if(!signCanvas) return;
  const img = signCanvas.toDataURL();
  resizeCanvas();
  setupCanvas();
  if(hasSignature){
    const tempImg = new Image();
    tempImg.onload = () => {
      signCtx.drawImage(tempImg, 0, 0, parseFloat(signCanvas.style.width), parseFloat(signCanvas.style.height));
    };
    tempImg.src = img;
  }
}

function resizeCanvas(){
  const wrapper = signCanvas.parentElement;
  const ratio = window.devicePixelRatio || 1;
  const w = wrapper.offsetWidth - 8;
  const h = 140;
  signCanvas.width = w * ratio;
  signCanvas.height = h * ratio;
  signCanvas.style.width = w + 'px';
  signCanvas.style.height = h + 'px';
  signCtx.scale(ratio, ratio);
}

function setupCanvas(){
  signCtx.strokeStyle = '#1A2238';
  signCtx.lineWidth = 2;
  signCtx.lineCap = 'round';
  signCtx.lineJoin = 'round';
}

function getCoords(e){
  const rect = signCanvas.getBoundingClientRect();
  let clientX, clientY;
  if(e.touches && e.touches.length){
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDrawing(e){
  isDrawing = true;
  const c = getCoords(e);
  lastX = c.x; lastY = c.y;
}

function draw(e){
  if(!isDrawing) return;
  const c = getCoords(e);
  signCtx.beginPath();
  signCtx.moveTo(lastX, lastY);
  signCtx.lineTo(c.x, c.y);
  signCtx.stroke();
  lastX = c.x; lastY = c.y;
  hasSignature = true;
}

function handleTouch(e){
  e.preventDefault();
  if(e.type === 'touchstart') startDrawing(e);
  else if(e.type === 'touchmove') draw(e);
}

function stopDrawing(){
  isDrawing = false;
}

function clearSignature(){
  if(!signCtx) return;
  signCtx.clearRect(0, 0, signCanvas.width, signCanvas.height);
  hasSignature = false;
}

// ============== ACTIONS ==============
function saveAsPDF(){
  window.print();
}

function buildInvoiceText(){
  const data = gatherData();
  const companyName = $('companyTitle').textContent || 'Company';
  const sName = ($('signName') && $('signName').value) || data.name;
  const sDate = ($('signDate') && $('signDate').value) || todayUS();
  const recipient = getRecipient();
  const greeting = recipient.name ? 'Hi ' + recipient.name + ',\n\n' : '';

  let text = greeting;
  text += '*' + companyName + '*\n';
  text += '*Invoice / Work Report*\n\n';
  text += 'Contractor: ' + sName + '\n';
  text += 'Week of: ' + dateLong(data.week) + '\n';
  text += 'Invoice #: ' + invoiceNumber + '\n';
  text += '\n— DAYS WORKED —\n';

  data.days.forEach(d => {
    text += '\n📅 ' + dateShort(d.date) + '\n';
    text += '   Hours: ' + d.hours.toFixed(1) + ' hrs\n';
    text += '   Amount: ' + formatMoney(d.amount) + '\n';
    if(d.work) text += '   Work: ' + d.work + '\n';
  });

  text += '\n— SUMMARY —\n';
  text += 'Total hours: ' + data.totalHours.toFixed(1) + ' hrs\n';
  text += 'Rate: $' + data.rate.toFixed(2) + '/hr\n';
  text += '*Total due: ' + formatMoney(data.totalDue) + '*\n\n';
  text += 'Date: ' + sDate + '\n';
  text += 'Signed by: ' + sName;

  return text;
}

function sendWhatsApp(){
  const recipient = getRecipient();
  const phone = (recipient.phone || '').replace(/\D/g, '');
  const text = buildInvoiceText();
  const encoded = encodeURIComponent(text);
  const url = phone
    ? 'https://wa.me/' + phone + '?text=' + encoded
    : 'https://wa.me/?text=' + encoded;
  window.open(url, '_blank');
  showToast(phone ? 'Opening WhatsApp...' : 'Set phone in Settings to open direct chat');
}

function sendEmail(){
  const data = gatherData();
  const recipient = getRecipient();
  const to = recipient.email || '';
  const companyName = $('companyTitle').textContent || 'Company';
  const subject = encodeURIComponent('Work Report — ' + data.name + ' — Week of ' + dateLong(data.week));
  const body = encodeURIComponent(buildInvoiceText());
  window.location.href = 'mailto:' + to + '?subject=' + subject + '&body=' + body;
  showToast(to ? 'Opening email to ' + to : 'Set email in Settings for direct send');
}

async function shareWithImage(){
  if(!navigator.share){
    showToast('Sharing not supported on this browser');
    return;
  }

  const data = gatherData();
  const text = buildInvoiceText();

  // Tentar incluir a assinatura como imagem
  if(hasSignature && signCanvas && navigator.canShare){
    try{
      const blob = await new Promise(resolve => signCanvas.toBlob(resolve, 'image/png'));
      if(blob){
        const file = new File([blob], 'signature_' + invoiceNumber + '.png', { type: 'image/png' });
        if(navigator.canShare({ files: [file] })){
          await navigator.share({
            title: 'Work Report — ' + data.name,
            text: text,
            files: [file]
          });
          showToast('Shared successfully');
          return;
        }
      }
    } catch(err) {
      console.log('Share with file failed, falling back to text:', err);
    }
  }

  // Fallback: text-only share
  try{
    await navigator.share({
      title: 'Work Report — ' + data.name,
      text: text
    });
    showToast('Shared successfully');
  } catch(err) {
    if(err.name !== 'AbortError'){
      showToast('Share canceled');
    }
  }
}
